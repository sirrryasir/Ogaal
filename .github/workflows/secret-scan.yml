name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --source . --report-path gitleaks-report.json

  no-dist:
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - name: Fail if backend/dist is present in the repo
        run: |
          count=$(git ls-files backend/dist | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "Error: backend/dist is tracked in the repository. Please remove build artifacts before committing.";
            git ls-files backend/dist
            exit 1
          fi
